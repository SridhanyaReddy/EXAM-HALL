<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Exam Hall Locator</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div id="loginArea">
            <h2 id="loginHeader">Admin Login</h2>
            <div id="loginInputs">
                <input id="username" type="text" placeholder="Username">
                <input id="password" type="password" placeholder="Password">
                <button onclick="login()">Login</button>
            </div>
        </div>

        <div class="admin-section" id="adminSection" style="display: none;">
            <h3>Add New Student</h3>
            <input id="rollNumber" type="text" placeholder="Roll Number">
            <input id="examHall" type="text" placeholder="Exam Hall Number">
            <button onclick="addStudent()">Save Student</button>
            
            <br>
            <button class="logout-btn" onclick="logout()" style="margin-top: 20px;">Logout</button>
        </div>

        <p id="msg"></p>

    </div>

    <script src="admin.js"></script>

</body>
</html>
